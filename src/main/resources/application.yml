server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-backend-kotlin-spring-starter
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_backend}
    username: ${DB_USER:ai_backend}
    password: ${DB_PASSWORD:ai_backend_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  jackson:
    default-property-inclusion: non_null

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  ai:
    provider: ${AI_PROVIDER:fake}
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:}
  auth:
    jwt-secret: ${JWT_SECRET}
    token-ttl-seconds: ${JWT_TOKEN_TTL_SECONDS}
