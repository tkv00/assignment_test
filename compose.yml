services:
  postgres:
    image: postgres:15.8
    container_name: ai-backend-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_backend}
      POSTGRES_USER: ${DB_USER:-ai_backend}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai_backend_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_backend} -d ${DB_NAME:-ai_backend}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    profiles:
      - app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ai_backend}
      DB_USER: ${DB_USER:-ai_backend}
      DB_PASSWORD: ${DB_PASSWORD:-ai_backend_password}
      AI_PROVIDER: ${AI_PROVIDER:-fake}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres-data:
